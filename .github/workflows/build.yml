name: Python package

on: [pull_request]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        pyspark-version: ["3.5.7", "4.1.1"]
        exclude:
          # pyspark 3.5.7 does not support Python 3.14
          - python-version: "3.14"
            pyspark-version: "3.5.7"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21
      - name: Cache Spark
        id: cache-spark
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/spark-${{ matrix.pyspark-version }}-bin-hadoop3
          key: spark-${{ matrix.pyspark-version }}-hadoop3-v2
      - name: Download Spark
        if: steps.cache-spark.outputs.cache-hit != 'true'
        env:
          SPARK_VERSION: ${{ matrix.pyspark-version }}
        run: |
          ARCHIVE="spark-${SPARK_VERSION}-bin-hadoop3.tgz"
          # Apache's CDN is much faster than archive.apache.org but only
          # carries currently-supported releases; fall back to the archive
          # for older versions.
          if ! curl -fsSL --connect-timeout 10 --max-time 300 \
            "https://dlcdn.apache.org/spark/spark-${SPARK_VERSION}/${ARCHIVE}" \
            -o /tmp/spark.tgz; then
            curl -fsSL --connect-timeout 10 --max-time 600 \
              "https://archive.apache.org/dist/spark/spark-${SPARK_VERSION}/${ARCHIVE}" \
              -o /tmp/spark.tgz
          fi
          tar -xzf /tmp/spark.tgz -C "$HOME"
          rm /tmp/spark.tgz
      - name: Set up SPARK_HOME
        env:
          SPARK_VERSION: ${{ matrix.pyspark-version }}
        run: |
          SPARK_HOME="$HOME/spark-${SPARK_VERSION}-bin-hadoop3"
          echo "SPARK_HOME=$SPARK_HOME" >> "$GITHUB_ENV"
          echo "$SPARK_HOME/bin" >> "$GITHUB_PATH"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyspark==${{ matrix.pyspark-version }}
      - name: Start Spark Connect
        if: ${{ matrix.pyspark-version == '4.1.1' }}
        run: |
          "${SPARK_HOME}/sbin/start-connect-server.sh" \
            --conf spark.ui.enabled=false \
            --conf spark.ui.showConsoleProgress=false
          python - <<'PY'
          import socket
          import time

          for _ in range(30):
              try:
                  with socket.create_connection(("127.0.0.1", 15002), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Spark Connect server did not start on port 15002")
          PY
      - name: Linting
        if: ${{ matrix.pyspark-version == '4.1.1' }}
        run: |
          flake8
          pylint typedspark
          mypy .
          pyright .
          bandit typedspark/**/*.py
          black --check .
          isort --check .
          docformatter --black -c **/*.py
      - name: Testing
        env:
          SPARK_CONNECT_URL: ${{ matrix.pyspark-version == '4.1.1' && 'sc://localhost:15002' || '' }}
        run: |
          # we run this test seperately, to ensure that it is run without an active Spark session
          python -m pytest -m no_spark_session

          coverage run -m pytest
          coverage report -m --fail-under 100
      - name: Run notebooks
        if: ${{ matrix.pyspark-version == '4.1.1' }}
        run: |
          for FILE in docs/*/*.ipynb; do
            BASE=$(basename $FILE)
            cp $FILE .
            jupyter nbconvert --to notebook $BASE --execute
          done
